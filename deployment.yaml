apiVersion: apps/v1
kind: Deployment
metadata:
  name: gold-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gold-web
  template:
    metadata:
      labels:
        app: gold-web
    spec:
      containers:
      - name: gold-web
        image: YOUR_DOCKER_USERNAME/gold-rate-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gold-service
spec:
  type: NodePort
  selector:
    app: gold-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30008
